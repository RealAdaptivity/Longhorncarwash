name: Validate

# Catches broken markup and JS syntax errors before they reach the live site.
on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    # Electron is a dev dependency but the lint/test jobs don't need its
    # prebuilt binary, so skip the ~100MB download during install.
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Check HTML structure (tag nesting)
        run: python3 scripts/check-html.py index.html

      - name: Check JavaScript syntax
        run: |
          set -e
          for f in *.js modules/*.js; do
            echo "node --check $f"
            node --check "$f"
          done

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm test

  mobile:
    # Type-checks the Expo/React Native app so type errors are caught before release.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

  functions:
    # Lints the Supabase (Deno) edge functions for syntax errors and common
    # mistakes. Uses deno lint (not deno check) because lint is purely
    # syntactic and does not resolve remote imports — deno check follows
    # Supabase's edge-runtime type declarations, which reference npm:openai
    # and fail to resolve in a bare checkout.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Lint edge functions
        run: deno lint supabase/functions
