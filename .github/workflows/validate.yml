name: Validate

# Catches broken markup and JS syntax errors before they reach the live site.
on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check HTML structure (tag nesting)
        run: python3 scripts/check-html.py index.html

      - name: Check JavaScript syntax
        run: |
          set -e
          for f in *.js modules/*.js; do
            echo "node --check $f"
            node --check "$f"
          done

  mobile:
    # Type-checks the Expo/React Native app so type errors are caught before release.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

  functions:
    # Type-checks the Supabase (Deno) edge functions so type errors are caught
    # before they are deployed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type-check edge functions
        run: |
          set -e
          for f in supabase/functions/*/index.ts; do
            echo "deno check $f"
            deno check "$f"
          done
